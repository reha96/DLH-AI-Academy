<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BeatRec - Create Your Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 2rem 1rem;
      font-family: 'DM Sans', sans-serif;
    }
    .phone {
      width: 340px;
      background: linear-gradient(160deg, #f9f9f9 0%, #f3f3f3 50%, #efefef 100%);
      border-radius: 36px;
      border: 1.5px solid rgba(0,0,0,0.08);
      padding: 44px 28px 36px;
      position: relative;
      overflow: hidden;
    }
    .logo {
      text-align: center;
      margin-bottom: 4px;
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: #111111;
      letter-spacing: -0.5px;
    }
    .logo span { color: #1DB954; }
    .page-sub {
      text-align: center;
      margin-bottom: 28px;
      font-size: 13px;
      color: rgba(0,0,0,0.45);
      font-weight: 300;
    }
    .field-label {
      font-size: 11px;
      font-weight: 500;
      color: rgba(0,0,0,0.50);
      margin-bottom: 6px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .field-input {
      width: 100%;
      background: rgba(0,0,0,0.05);
      border: 1px solid rgba(0,0,0,0.12);
      border-radius: 10px;
      padding: 11px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: #111111;
      outline: none;
      margin-bottom: 26px;
      transition: border-color 0.2s;
    }
    .field-input::placeholder { color: rgba(0,0,0,0.28); }
    .field-input:focus { border-color: rgba(29,185,84,0.8); }
    .section-label {
      font-size: 11px;
      font-weight: 500;
      color: rgba(0,0,0,0.50);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 14px;
      margin-top: 10px;
    }
    .song-rating-card {
      background: rgba(0,0,0,0.04);
      border: 1px solid rgba(0,0,0,0.10);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .song-emoji {
      font-size: 28px;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(29,185,84,0.1);
      border-radius: 8px;
      flex-shrink: 0;
    }
    .song-info {
      flex: 1;
      min-width: 0;
    }
    .song-title {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #111111;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .song-artist {
      font-size: 11px;
      color: rgba(0,0,0,0.40);
      margin-top: 2px;
    }
    .star-rating {
      display: flex;
      gap: 3px;
      flex-shrink: 0;
    }
    .star {
      font-size: 18px;
      color: rgba(0,0,0,0.15);
      cursor: pointer;
      transition: color 0.15s;
    }
    .star.filled {
      color: #FFD700;
    }
    .star:hover {
      color: #FFC700;
    }
    .btn-continue {
      width: 100%;
      padding: 15px;
      border-radius: 14px;
      border: none;
      outline: none;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
      background: linear-gradient(90deg, #1DB954, #17a348);
      letter-spacing: 0.3px;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 16px;
    }
    .btn-continue:hover { opacity: 0.9; }
    .btn-continue:active { transform: scale(0.98); }
    .btn-continue:disabled {
      background: rgba(0,0,0,0.2);
      cursor: not-allowed;
    }
    .progress-indicator {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 20px;
    }
    .progress-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(0,0,0,0.15);
    }
    .progress-dot.active {
      background: #1DB954;
    }
    .loading {
      text-align: center;
      padding: 20px;
      color: rgba(0,0,0,0.40);
    }
    .spinner {
      width: 24px;
      height: 24px;
      border: 3px solid rgba(29,185,84,0.2);
      border-top-color: #1DB954;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="logo">Beat<span>Rec</span></div>
    <div class="page-sub">Step 1 of 3 — Create Your Profile</div>
    
    <div class="progress-indicator">
      <div class="progress-dot active"></div>
      <div class="progress-dot"></div>
      <div class="progress-dot"></div>
    </div>

    <div class="field-label">Your Name</div>
    <input class="field-input" id="inp-name" type="text" placeholder="Enter your name" />

    <div class="section-label">Rate 10 Sample Songs</div>
    <div style="font-size:11px;color:rgba(0,0,0,0.35);margin-bottom:16px;">
      Listen to previews and give each song a 1-5 star rating
    </div>

    <div id="songs-container">
      <div class="loading">
        <div class="spinner"></div>
        Loading sample songs...
      </div>
    </div>

    <button class="btn-continue" id="btn-continue" onclick="goToPage2()" disabled>
      Continue to Preferences →
    </button>
  </div>

  <script>
    let ratings = {};
    let loadedTracks = [];

    async function loadSampleSongs() {
      try {
        const response = await fetch('/api/sample-songs');
        const data = await response.json();
        loadedTracks = data.tracks;
        renderSongs(data.tracks);
      } catch (error) {
        document.getElementById('songs-container').innerHTML = `
          <div class="loading">Error loading songs. Please refresh.</div>
        `;
      }
    }

    function renderSongs(tracks) {
      const container = document.getElementById('songs-container');
      container.innerHTML = tracks.map((track, index) => `
        <div class="song-rating-card">
          <div class="song-emoji">🎵</div>
          <div class="song-info">
            <div class="song-title">${escapeHtml(track.title)}</div>
            <div class="song-artist">${escapeHtml(track.artist)}</div>
            ${track.preview_url ? `<audio controls preload="metadata" style="width:100%;margin-top:6px;max-height:32px;">
              <source src="${track.preview_url}" type="audio/mp4">
            </audio>` : ''}
          </div>
          <div class="star-rating" data-track-id="${track.track_id}">
            ${[1,2,3,4,5].map(star => `
              <span class="star" data-star="${star}" onclick="setRating('${track.track_id}', ${star})">★</span>
            `).join('')}
          </div>
        </div>
      `).join('');
    }

    function setRating(trackId, stars) {
      ratings[trackId] = stars;
      
      // Update visual stars
      const container = document.querySelector(`[data-track-id="${trackId}"]`);
      container.querySelectorAll('.star').forEach(star => {
        const starNum = parseInt(star.getAttribute('data-star'));
        star.classList.toggle('filled', starNum <= stars);
      });

      // Check if all songs are rated
      const allRated = loadedTracks.every(t => ratings[t.track_id]);
      document.getElementById('btn-continue').disabled = !allRated;
    }

    function goToPage2() {
      // Store ratings in localStorage
      const profileData = {
        name: document.getElementById('inp-name').value || 'Listener',
        ratings: Object.entries(ratings).map(([track_id, rating]) => ({ track_id, rating }))
      };
      localStorage.setItem('beatrec_profile', JSON.stringify(profileData));
      window.location.href = '/preferences';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Load songs on page load
    loadSampleSongs();
  </script>
</body>
</html>
