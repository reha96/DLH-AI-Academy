<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BeatRec - Create Your Profile</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Shared Styles -->
  <link rel="stylesheet" href="/static/css/beatrec.css">

  <!-- Profile Utilities -->
  <script src="/static/profile-utils.js"></script>

  <style>
    /* Page-specific: Page 1 - Rate Songs */
    .app-container { width: min(400px, 95vw); }
    .mui-card { border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
    .card-content { padding: 24px; }
    .mui-button { border-radius: 8px; }
    .mui-button-outlined { border: 1px solid var(--mui-divider); }
    .mui-input { border: 1px solid var(--mui-divider); border-radius: 8px; }
    .linear-progress { height: 6px; background: var(--mui-divider); border-radius: 3px; overflow: hidden; }
    .linear-progress-bar { height: 100%; background: linear-gradient(90deg, var(--mui-primary-main), var(--mui-primary-dark)); border-radius: 3px; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
  </style>
</head>
<body>
  <div class="app-container">
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">
      <!-- Sun icon for dark mode (click to go light) -->
      <svg class="icon" id="theme-icon-sun" viewBox="0 0 24 24" style="display:none">
        <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58a.996.996 0 0 0-1.41 0 .996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37a.996.996 0 0 0-1.41 0 .996.996 0 0 0 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0a.996.996 0 0 0 0-1.41l-1.06-1.06zm1.06-10.96a.996.996 0 0 0 0-1.41.996.996 0 0 0-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06zM7.05 18.36a.996.996 0 0 0 0-1.41.996.996 0 0 0-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06z"/>
      </svg>
      <!-- Moon icon for light mode (click to go dark) -->
      <svg class="icon" id="theme-icon-moon" viewBox="0 0 24 24">
        <path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>
      </svg>
    </button>

    <div class="mui-card">
      <div class="card-content">
        <div class="header">
          <div class="logo">Beat<span>Rec</span></div>
          <div class="subtitle" id="page-subtitle">Step 2 of 4 — Rate Songs</div>
        </div>

        <!-- M3 Linear Progress -->
        <div class="progress-section">
          <div class="progress-label">
            <span>Song Progress</span>
            <span class="progress-label-accent"><span id="rated-count">0</span> / <span id="total-count">10</span></span>
          </div>
          <div class="m3-linear-progress">
            <div class="m3-progress-indicator" id="progress-fill" style="width: 0%"></div>
          </div>
        </div>

        <div id="song-container">
          <div class="loading">
            <div class="mui-spinner"></div>
            <div>Loading sample songs...</div>
          </div>
        </div>

        <div class="button-row">
          <button class="mui-button mui-button-outlined" id="btn-prev" onclick="prevSong()" disabled>
            <svg class="icon" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            Previous
          </button>
          <button class="mui-button mui-button-contained" id="btn-next" onclick="nextSong()" disabled>
            Next
            <svg class="icon" viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- MUI Snackbar -->
  <div class="mui-snackbar" id="snackbar">
    <svg class="icon" id="snackbar-icon" viewBox="0 0 24 24"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>
    <span class="snackbar-message" id="snackbar-message">Message</span>
  </div>

  <script>
    let songs = [];
    let currentSongIndex = 0;
    let ratings = {};
    let previewDuration = 30;
    let isDarkMode = false;
    let isPlaying = false;

    // Theme Toggle
    function toggleTheme() {
      isDarkMode = !isDarkMode;
      document.documentElement.setAttribute('data-theme', isDarkMode ? 'dark' : 'light');
      document.getElementById('theme-icon-sun').style.display = isDarkMode ? 'block' : 'none';
      document.getElementById('theme-icon-moon').style.display = isDarkMode ? 'none' : 'block';
      localStorage.setItem('beatrec_theme', isDarkMode ? 'dark' : 'light');
    }

    // Load saved theme
    const savedTheme = localStorage.getItem('beatrec_theme');
    if (savedTheme === 'dark') {
      isDarkMode = true;
      document.documentElement.setAttribute('data-theme', 'dark');
      document.getElementById('theme-icon-sun').style.display = 'block';
      document.getElementById('theme-icon-moon').style.display = 'none';
    }

    // Snackbar (Toast) function
    function showSnackbar(message, type = 'info') {
      const snackbar = document.getElementById('snackbar');
      const snackbarMessage = document.getElementById('snackbar-message');
      const snackbarIcon = document.getElementById('snackbar-icon');
      
      snackbarMessage.textContent = message;
      snackbar.className = 'mui-snackbar';
      
      if (type === 'error') {
        snackbar.classList.add('error');
        // Warning icon
        snackbarIcon.innerHTML = '<path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/>';
      } else if (type === 'success') {
        snackbar.classList.add('success');
        // Check circle icon
        snackbarIcon.innerHTML = '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>';
      } else {
        // Info icon
        snackbarIcon.innerHTML = '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>';
      }
      
      snackbar.classList.add('show');
      
      setTimeout(() => {
        snackbar.classList.remove('show');
      }, 3000);
    }

    async function loadSampleSongs() {
      try {
        const response = await fetch('/api/sample-songs');
        const data = await response.json();
        songs = data.tracks;
        document.getElementById('total-count').textContent = songs.length;
        renderSong(currentSongIndex);
        updateNavButtons();
      } catch (error) {
        document.getElementById('song-container').innerHTML = `
          <div class="loading">
            <svg class="icon icon-xxl" style="color: var(--mui-error-main); margin-bottom: 12px" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            <div>Error loading songs. Please refresh.</div>
          </div>
        `;
      }
    }

    function renderSong(index) {
      if (songs.length === 0) return;
      
      const song = songs[index];
      const container = document.getElementById('song-container');
      const hasPreview = song.preview_url && song.preview_url !== null;
      
      container.innerHTML = `
        <div class="album-art-wrapper">
          ${song.artwork_url 
            ? `<img class="album-art" src="${song.artwork_url}" alt="Album Art" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
               <div class="album-art-placeholder" style="display:none">🎵</div>`
            : `<div class="album-art-placeholder">🎵</div>`
          }
        </div>
        
        <div class="song-info">
          <div class="song-title">${escapeHtml(song.title)}</div>
          <div class="song-artist">${escapeHtml(song.artist)}</div>
          <div class="song-chip">
            <svg class="icon icon-sm" viewBox="0 0 24 24"><path d="M12 3v9.28c-.47-.17-.97-.28-1.5-.28C8.01 12 6 14.01 6 16.5S8.01 21 10.5 21c2.31 0 4.2-1.75 4.45-4H15V6h4V3h-7z"/></svg>
            ${escapeHtml(song.genre)}
          </div>
        </div>
        
        <div class="audio-player">
          ${hasPreview ? `
            <div class="player-controls">
              <button class="mui-fab" id="play-btn" onclick="togglePlay()">
                <svg class="icon icon-lg" id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              </button>
              <div class="slider-container">
                <input type="range" class="mui-slider" id="progress-slider" min="0" max="${previewDuration * 1000}" value="0" oninput="seekAudio(this.value)">
                <div class="time-display">
                  <span id="time-current">0:00</span>
                  <span id="time-total">0:${previewDuration}</span>
                </div>
              </div>
            </div>
            <audio id="audio-element" preload="metadata" ontimeupdate="updateProgress()" onended="onAudioEnded()">
              <source src="${song.preview_url}" type="audio/mp4">
            </audio>
          ` : `
            <div style="text-align:center;padding:24px;color:var(--mui-text-secondary);font-size:14px;">
              <svg class="icon icon-xl" style="opacity:0.5; margin-bottom:8px" viewBox="0 0 24 24"><path d="M12 3v9.28c-.47-.17-.97-.28-1.5-.28C8.01 12 6 14.01 6 16.5S8.01 21 10.5 21c2.31 0 4.2-1.75 4.45-4H15V6h4V3h-7z"/></svg><br>
              Preview not available
            </div>
          `}
        </div>
        
        <div class="rating-section">
          <div class="rating-label">How much do you like this song?</div>
          <div class="star-rating" data-track-id="${song.track_id}">
            ${[1,2,3,4,5].map(star => `
              <span class="star ${getStarClass(song.track_id, star)}" 
                    data-star="${star}" 
                    onclick="setRating('${song.track_id}', ${star})">★</span>
            `).join('')}
          </div>
        </div>
      `;
      
      updateProgressBar();
    }

    function getStarClass(trackId, starNum) {
      const rating = ratings[trackId];
      if (!rating) return '';
      return starNum <= rating ? 'filled' : '';
    }

    function setRating(trackId, stars) {
      ratings[trackId] = stars;
      
      const container = document.querySelector(`[data-track-id="${trackId}"]`);
      if (container) {
        container.querySelectorAll('.star').forEach(star => {
          const starNum = parseInt(star.getAttribute('data-star'));
          star.classList.toggle('filled', starNum <= stars);
        });
      }
      
      saveProfile();
      updateProgressBar();
      updateNavButtons();
      
      showSnackbar('Rating saved!', 'success');
    }

    function saveProfile() {
      const existingProfile = localStorage.getItem('beatrec_profile');
      let profileData = existingProfile ? JSON.parse(existingProfile) : {};
      profileData.ratings = Object.entries(ratings).map(([track_id, rating]) => ({ track_id, rating }));
      saveProfileData(profileData);
    }

    function updateProgressBar() {
      const progress = (Object.keys(ratings).length / songs.length) * 100;
      document.getElementById('progress-fill').style.width = `${progress}%`;
      document.getElementById('rated-count').textContent = Object.keys(ratings).length;
    }

    function updateNavButtons() {
      const currentSong = songs[currentSongIndex];
      const btnPrev = document.getElementById('btn-prev');
      const btnNext = document.getElementById('btn-next');
      const isRated = currentSong && ratings[currentSong.track_id];
      const allRated = songs.length > 0 && songs.every(s => ratings[s.track_id]);
      
      btnPrev.disabled = currentSongIndex === 0;
      
      if (allRated) {
        btnNext.innerHTML = 'Continue <svg class="icon" viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>';
        btnNext.onclick = goToPage2;
        btnNext.disabled = false;
      } else {
        btnNext.innerHTML = 'Next <svg class="icon" viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>';
        btnNext.onclick = nextSong;
        btnNext.disabled = !isRated;
      }
    }

    function prevSong() {
      if (currentSongIndex > 0) {
        stopAudio();
        currentSongIndex--;
        renderSong(currentSongIndex);
        updateNavButtons();
      }
    }

    function nextSong() {
      const currentSong = songs[currentSongIndex];
      
      if (currentSong && !ratings[currentSong.track_id]) {
        showSnackbar('Please rate this song first', 'error');
        return;
      }
      
      if (currentSongIndex < songs.length - 1) {
        stopAudio();
        currentSongIndex++;
        renderSong(currentSongIndex);
        updateNavButtons();
      } else {
        goToPage2();
      }
    }

    function goToPage2() {
      saveProfile();
      navigateWithProfile('/select-genres');
    }

    // Audio Player Functions
    function togglePlay() {
      const audio = document.getElementById('audio-element');
      const playIcon = document.getElementById('play-icon');
      
      if (!audio) return;
      
      if (isPlaying) {
        audio.pause();
        playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
        isPlaying = false;
      } else {
        audio.play();
        playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
        isPlaying = true;
      }
    }

    function stopAudio() {
      const audio = document.getElementById('audio-element');
      if (audio) {
        audio.pause();
        audio.currentTime = 0;
      }
      isPlaying = false;
    }

    function updateProgress() {
      const audio = document.getElementById('audio-element');
      const slider = document.getElementById('progress-slider');
      const timeCurrent = document.getElementById('time-current');
      
      if (audio && slider && timeCurrent) {
        const currentTime = Math.min(audio.currentTime, previewDuration);
        timeCurrent.textContent = formatTime(currentTime);
        slider.value = currentTime * 1000;
        
        if (audio.currentTime >= previewDuration) {
          audio.pause();
          audio.currentTime = 0;
          onAudioEnded();
        }
      }
    }

    function seekAudio(value) {
      const audio = document.getElementById('audio-element');
      if (audio) {
        const timeInSeconds = value / 1000;
        audio.currentTime = Math.min(timeInSeconds, previewDuration);
      }
    }

    function onAudioEnded() {
      isPlaying = false;
      const playIcon = document.getElementById('play-icon');
      if (playIcon) playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
      
      const currentSong = songs[currentSongIndex];
      if (currentSong && !ratings[currentSong.track_id]) {
        showSnackbar('Please rate this song before continuing', 'error');
      }
    }

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    // Initialize
    loadSampleSongs();
    displayProfileName('Step 2 of 5');
  </script>
</body>
</html>
