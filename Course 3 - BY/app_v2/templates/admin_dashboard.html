<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BeatRec - Admin Dashboard</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Shared Styles -->
  <link rel="stylesheet" href="/static/css/beatrec.css">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <style>
    /* Admin Dashboard Styles */
    body {
      background: var(--mui-surface);
    }
    .admin-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--mui-divider);
    }
    .admin-title {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--mui-text-primary);
    }
    .admin-subtitle {
      font-size: 14px;
      color: var(--mui-text-secondary);
      margin-top: 8px;
    }
    .admin-actions {
      display: flex;
      gap: 12px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .stat-card {
      background: var(--mui-surface);
      border: 1px solid var(--mui-divider);
      border-radius: 16px;
      padding: 24px;
      text-align: center;
    }
    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 36px;
      font-weight: 700;
      color: var(--mui-primary-main);
      margin-bottom: 8px;
    }
    .stat-label {
      font-size: 13px;
      color: var(--mui-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
      gap: 24px;
      margin-bottom: 40px;
    }
    .chart-card {
      background: var(--mui-surface);
      border: 1px solid var(--mui-divider);
      border-radius: 16px;
      padding: 24px;
    }
    .chart-title {
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: var(--mui-text-primary);
      margin-bottom: 20px;
    }
    .chart-container {
      position: relative;
      height: 300px;
    }
    .feedback-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--mui-surface);
      border: 1px solid var(--mui-divider);
      border-radius: 16px;
      overflow: hidden;
    }
    .feedback-table th {
      background: rgba(29,185,84,0.08);
      padding: 16px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: var(--mui-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .feedback-table td {
      padding: 16px;
      border-top: 1px solid var(--mui-divider);
      font-size: 14px;
      color: var(--mui-text-primary);
    }
    .feedback-table tr:hover {
      background: rgba(29,185,84,0.04);
    }
    .rating-stars {
      color: #FFD700;
      font-size: 16px;
    }
    .comment-text {
      max-width: 400px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--mui-text-secondary);
    }
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 400px;
      color: var(--mui-text-secondary);
    }
    .mui-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--mui-divider);
      border-top-color: var(--mui-primary-main);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="admin-container">
    <div class="admin-header">
      <div>
        <div class="admin-title">📊 BeatRec Admin Dashboard</div>
        <div class="admin-subtitle">User Feedback Analytics</div>
      </div>
      <div class="admin-actions">
        <button class="mui-button mui-button-outlined" onclick="refreshData()">
          <svg class="icon" viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c2.21 0 4.21.9 5.65 2.35V11l5-5-5-5v5.35z"/></svg>
          Refresh
        </button>
        <button class="mui-button mui-button-contained" onclick="exportCSV()">
          <svg class="icon" viewBox="0 0 24 24"><path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>
          Export CSV
        </button>
      </div>
    </div>

    <!-- Stats Overview -->
    <div class="stats-grid" id="stats-grid">
      <div class="loading">
        <div class="mui-spinner"></div>
        <div>Loading statistics...</div>
      </div>
    </div>

    <!-- Charts -->
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-title">📈 Average Ratings Over Time</div>
        <div class="chart-container">
          <canvas id="ratingsChart"></canvas>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">📊 Rating Distribution</div>
        <div class="chart-container">
          <canvas id="distributionChart"></canvas>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">🎯 Metrics Comparison</div>
        <div class="chart-container">
          <canvas id="metricsChart"></canvas>
        </div>
      </div>
      <div class="chart-card">
        <div class="chart-title">🤖 Model Performance</div>
        <div class="chart-container">
          <canvas id="modelChart"></canvas>
        </div>
      </div>
    </div>

    <!-- Recent Feedback Table -->
    <div class="chart-card">
      <div class="chart-title">💬 Recent Feedback</div>
      <table class="feedback-table">
        <thead>
          <tr>
            <th>Timestamp</th>
            <th>User</th>
            <th>Accuracy</th>
            <th>Diversity</th>
            <th>Serendipity</th>
            <th>Usability</th>
            <th>Comment</th>
          </tr>
        </thead>
        <tbody id="feedback-tbody">
          <!-- Loaded dynamically -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    let feedbackData = [];
    let charts = {};

    // Load feedback data
    async function loadFeedbackData() {
      try {
        const response = await fetch('/api/admin/feedback-data');
        const data = await response.json();
        feedbackData = data.feedback || [];
        
        if (feedbackData.length === 0) {
          document.getElementById('stats-grid').innerHTML = `
            <div class="stat-card" style="grid-column: 1/-1">
              <div class="stat-value">0</div>
              <div class="stat-label">No feedback yet</div>
            </div>
          `;
          return;
        }

        renderStats();
        renderCharts();
        renderTable();
      } catch (error) {
        console.error('Error loading feedback data:', error);
      }
    }

    // Render statistics
    function renderStats() {
      const total = feedbackData.length;
      const avgAccuracy = calculateAverage('accuracy');
      const avgDiversity = calculateAverage('diversity');
      const avgSerendipity = calculateAverage('serendipity');
      const avgUsability = calculateAverage('usability');

      document.getElementById('stats-grid').innerHTML = `
        <div class="stat-card">
          <div class="stat-value">${total}</div>
          <div class="stat-label">Total Responses</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${avgAccuracy.toFixed(1)}</div>
          <div class="stat-label">Avg Accuracy</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${avgDiversity.toFixed(1)}</div>
          <div class="stat-label">Avg Diversity</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${avgSerendipity.toFixed(1)}</div>
          <div class="stat-label">Avg Serendipity</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">${avgUsability.toFixed(1)}</div>
          <div class="stat-label">Avg Usability</div>
        </div>
      `;
    }

    function calculateAverage(field) {
      if (feedbackData.length === 0) return 0;
      const sum = feedbackData.reduce((acc, row) => acc + (parseFloat(row[field]) || 0), 0);
      return sum / feedbackData.length;
    }

    // Render charts
    function renderCharts() {
      // Ratings over time
      const labels = feedbackData.slice(-10).map(d => {
        const date = new Date(d.timestamp);
        return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      });

      createChart('ratingsChart', 'line', {
        labels: labels,
        datasets: [
          {
            label: 'Accuracy',
            data: feedbackData.slice(-10).map(d => parseFloat(d.accuracy) || 0),
            borderColor: '#1DB954',
            tension: 0.3
          },
          {
            label: 'Diversity',
            data: feedbackData.slice(-10).map(d => parseFloat(d.diversity) || 0),
            borderColor: '#4287f5',
            tension: 0.3
          },
          {
            label: 'Serendipity',
            data: feedbackData.slice(-10).map(d => parseFloat(d.serendipity) || 0),
            borderColor: '#f5a623',
            tension: 0.3
          },
          {
            label: 'Usability',
            data: feedbackData.slice(-10).map(d => parseFloat(d.usability) || 0),
            borderColor: '#d0021b',
            tension: 0.3
          }
        ]
      });

      // Distribution
      createChart('distributionChart', 'bar', {
        labels: ['1 ★', '2 ★', '3 ★', '4 ★', '5 ★'],
        datasets: [
          {
            label: 'Accuracy',
            data: countRatings('accuracy'),
            backgroundColor: '#1DB954'
          },
          {
            label: 'Diversity',
            data: countRatings('diversity'),
            backgroundColor: '#4287f5'
          },
          {
            label: 'Serendipity',
            data: countRatings('serendipity'),
            backgroundColor: '#f5a623'
          },
          {
            label: 'Usability',
            data: countRatings('usability'),
            backgroundColor: '#d0021b'
          }
        ]
      });

      // Metrics comparison
      createChart('metricsChart', 'radar', {
        labels: ['Accuracy', 'Diversity', 'Serendipity', 'Usability'],
        datasets: [{
          label: 'Average',
          data: [
            calculateAverage('accuracy'),
            calculateAverage('diversity'),
            calculateAverage('serendipity'),
            calculateAverage('usability')
          ],
          backgroundColor: 'rgba(29,185,84,0.2)',
          borderColor: '#1DB954',
          borderWidth: 2
        }]
      });

      // Model performance
      const modelStats = {};
      feedbackData.forEach(d => {
        const model = d.session_model || 'Unknown';
        if (!modelStats[model]) {
          modelStats[model] = { sum: 0, count: 0 };
        }
        const total = (parseFloat(d.accuracy) || 0) + 
                      (parseFloat(d.diversity) || 0) + 
                      (parseFloat(d.serendipity) || 0) + 
                      (parseFloat(d.usability) || 0);
        modelStats[model].sum += total;
        modelStats[model].count += 1;
      });

      createChart('modelChart', 'bar', {
        labels: Object.keys(modelStats),
        datasets: [{
          label: 'Avg Total Score',
          data: Object.keys(modelStats).map(k => (modelStats[k].sum / modelStats[k].count / 4).toFixed(2)),
          backgroundColor: '#1DB954'
        }]
      });
    }

    function countRatings(field) {
      const counts = [0, 0, 0, 0, 0];
      feedbackData.forEach(d => {
        const val = parseInt(d[field]) || 0;
        if (val >= 1 && val <= 5) {
          counts[val - 1]++;
        }
      });
      return counts;
    }

    function createChart(canvasId, type, data) {
      const ctx = document.getElementById(canvasId).getContext('2d');
      
      if (charts[canvasId]) {
        charts[canvasId].destroy();
      }

      charts[canvasId] = new Chart(ctx, {
        type: type,
        data: data,
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: true,
              position: 'bottom'
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              max: 5
            }
          }
        }
      });
    }

    // Render table
    function renderTable() {
      const tbody = document.getElementById('feedback-tbody');
      const recentData = feedbackData.slice().reverse().slice(0, 20);

      tbody.innerHTML = recentData.map(d => {
        const date = new Date(d.timestamp);
        const formattedDate = date.toLocaleString('en-US', { 
          month: 'short', 
          day: 'numeric', 
          hour: '2-digit', 
          minute: '2-digit' 
        });

        return `
          <tr>
            <td>${formattedDate}</td>
            <td>${escapeHtml(d.session_name || 'Anonymous')}</td>
            <td><span class="rating-stars">${'★'.repeat(d.accuracy || 0)}${'☆'.repeat(5 - (d.accuracy || 0))}</span></td>
            <td><span class="rating-stars">${'★'.repeat(d.diversity || 0)}${'☆'.repeat(5 - (d.diversity || 0))}</span></td>
            <td><span class="rating-stars">${'★'.repeat(d.serendipity || 0)}${'☆'.repeat(5 - (d.serendipity || 0))}</span></td>
            <td><span class="rating-stars">${'★'.repeat(d.usability || 0)}${'☆'.repeat(5 - (d.usability || 0))}</span></td>
            <td class="comment-text" title="${escapeHtml(d.comment || '')}">${escapeHtml(d.comment || '—')}</td>
          </tr>
        `;
      }).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function refreshData() {
      loadFeedbackData();
    }

    function exportCSV() {
      window.location.href = '/admin/export-feedback';
    }

    // Initialize
    loadFeedbackData();
  </script>
</body>
</html>
