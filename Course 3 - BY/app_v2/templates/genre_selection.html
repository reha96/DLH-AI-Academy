<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BeatRec - Select Genres</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Shared Styles -->
  <link rel="stylesheet" href="/static/css/beatrec.css">

  <!-- Profile Utilities -->
  <script src="/static/profile-utils.js"></script>

  <style>
    /* Page-specific: Genre Selection */
    .genre-section { margin-bottom: 28px; }
    .genre-hint { font-size: 13px; color: var(--mui-text-secondary); margin-bottom: 16px; text-align: center; }
    .genre-grid { max-height: 400px; }
    .selection-counter {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px; background: rgba(29,185,84,0.08);
      border: 1px solid rgba(29,185,84,0.2); border-radius: 12px; margin-bottom: 20px;
    }
    .counter-text { font-size: 13px; color: var(--mui-text-secondary); }
    .counter-value { font-size: 16px; font-weight: 600; color: var(--mui-primary-main); }
  </style>
</head>
<body>
  <div class="app-container" style="position: relative">
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">
      <svg class="icon" id="theme-icon-sun" viewBox="0 0 24 24" style="display:none">
        <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1z"/>
      </svg>
      <svg class="icon" id="theme-icon-moon" viewBox="0 0 24 24">
        <path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>
      </svg>
    </button>

    <div class="mui-card">
      <div class="card-content">
        <div class="header">
          <div class="logo">Beat<span>Rec</span></div>
          <div class="subtitle" id="page-subtitle">Step 3 of 5 — Select Genres</div>
        </div>

        <div class="progress-stepper">
          <div class="step-dot completed"></div>
          <div class="step-dot completed"></div>
          <div class="step-dot active"></div>
          <div class="step-dot"></div>
          <div class="step-dot"></div>
        </div>

        <!-- M3 Progress -->
        <div class="progress-section">
          <div class="progress-label">
            <span>Overall Progress</span>
            <span class="progress-label-accent">40%</span>
          </div>
          <div class="m3-linear-progress">
            <div class="m3-progress-indicator" style="width: 40%"></div>
          </div>
        </div>

        <!-- Section Label -->
        <div class="section-label">
          <svg class="icon" viewBox="0 0 24 24"><path d="M12 3v9.28c-.47-.17-.97-.28-1.5-.28C8.01 12 6 14.01 6 16.5S8.01 21 10.5 21c2.31 0 4.2-1.75 4.45-4H15V6h4V3h-7z"/></svg>
          Choose Your Favorite Genres
        </div>

        <div class="genre-hint">
          Select one or more genres you enjoy listening to
        </div>

        <!-- Selection Counter -->
        <div class="selection-counter">
          <span class="counter-text">Selected genres</span>
          <span class="counter-value"><span id="selected-count">0</span> genres</span>
        </div>

        <!-- Genre Grid -->
        <div class="genre-section">
          <div class="genre-grid" id="genre-grid">
            <!-- Genres loaded dynamically -->
          </div>
        </div>

        <!-- Buttons -->
        <div class="button-row">
          <button class="mui-button mui-button-outlined" onclick="goBack()">
            <svg class="icon" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            Back
          </button>
          <button class="mui-button mui-button-contained" id="btn-continue" onclick="goToNextPage()" disabled>
            Continue
            <svg class="icon" viewBox="0 0 24 24"><path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Snackbar -->
  <div class="mui-snackbar" id="snackbar">
    <svg class="icon" id="snackbar-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
    <span class="snackbar-message" id="snackbar-message">Message</span>
  </div>

  <script>
    let selectedGenres = [];
    let allGenres = [];
    let isDarkMode = false;

    // Theme Toggle
    function toggleTheme() {
      isDarkMode = !isDarkMode;
      document.documentElement.setAttribute('data-theme', isDarkMode ? 'dark' : 'light');
      document.getElementById('theme-icon-sun').style.display = isDarkMode ? 'block' : 'none';
      document.getElementById('theme-icon-moon').style.display = isDarkMode ? 'none' : 'block';
      localStorage.setItem('beatrec_theme', isDarkMode ? 'dark' : 'light');
    }

    // Load saved theme
    const savedTheme = localStorage.getItem('beatrec_theme');
    if (savedTheme === 'dark') {
      isDarkMode = true;
      document.documentElement.setAttribute('data-theme', 'dark');
      document.getElementById('theme-icon-sun').style.display = 'block';
      document.getElementById('theme-icon-moon').style.display = 'none';
    }

    // Snackbar
    function showSnackbar(message, type = 'info') {
      const snackbar = document.getElementById('snackbar');
      const snackbarMessage = document.getElementById('snackbar-message');
      const snackbarIcon = document.getElementById('snackbar-icon');
      
      snackbarMessage.textContent = message;
      snackbar.className = 'mui-snackbar';
      
      if (type === 'error') {
        snackbar.classList.add('error');
        snackbarIcon.innerHTML = '<path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/>';
      } else if (type === 'success') {
        snackbar.classList.add('success');
        snackbarIcon.innerHTML = '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>';
      } else {
        snackbarIcon.innerHTML = '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>';
      }
      
      snackbar.classList.add('show');
      setTimeout(() => snackbar.classList.remove('show'), 3000);
    }

    // Get profile name from URL or localStorage
    function getProfileName() {
      // This function is now in profile-utils.js, but keeping here for backward compatibility
      // Will be removed in next refactor
      const urlParams = new URLSearchParams(window.location.search);
      const profileFromUrl = urlParams.get('profile');
      if (profileFromUrl) {
        return decodeURIComponent(profileFromUrl);
      }
      const profile = localStorage.getItem('beatrec_profile');
      if (profile) {
        const data = JSON.parse(profile);
        return data.name || 'Profile-1';
      }
      return 'Profile-1';
    }

    // Display profile name in subtitle (wrapper for shared utility)
    function initProfileDisplay() {
      displayProfileName('Step 3 of 5');
    }

    // Load all genres from API
    async function loadGenres() {
      try {
        const response = await fetch('/api/genres');
        const data = await response.json();
        allGenres = data.genres;
        renderGenreGrid();
        loadSavedGenres();
      } catch (error) {
        console.error('Error loading genres:', error);
        showSnackbar('Failed to load genres', 'error');
      }
    }

    // Render genre grid
    function renderGenreGrid() {
      const grid = document.getElementById('genre-grid');
      
      const genreEmojis = {
        'rock': '🎸', 'hip-hop': '🎤', 'electronic': '🎹', 'jazz': '🎷',
        'pop': '💫', 'classical': '🎻', 'country': '🤠', 'r&b / soul': '🎤',
        'edm': '🎧', 'dance': '💃', 'rap': '🎤', 'latin': '💃', 'metal': '🤘',
        'blues': '🎺', 'reggae': '🥁', 'folk': '🪕', 'indie': '🎵'
      };
      
      grid.innerHTML = allGenres.map(genre => {
        const emoji = genreEmojis[genre.toLowerCase()] || '🎵';
        const isActive = selectedGenres.includes(genre);
        return `
          <div class="genre-chip ${isActive ? 'active' : ''}" onclick="toggleGenre(this, '${genre}')">
            <div class="genre-emoji">${emoji}</div>
            <span class="genre-name">${genre}</span>
            <div class="genre-check">
              <svg class="icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            </div>
          </div>
        `;
      }).join('');
      
      updateCounter();
      updateButton();
    }

    // Toggle genre selection
    function toggleGenre(card, genre) {
      card.classList.toggle('active');
      if (selectedGenres.includes(genre)) {
        selectedGenres = selectedGenres.filter(g => g !== genre);
      } else {
        selectedGenres.push(genre);
      }
      updateCounter();
      updateButton();
    }

    // Update selection counter
    function updateCounter() {
      document.getElementById('selected-count').textContent = selectedGenres.length;
    }

    // Update continue button
    function updateButton() {
      const btnContinue = document.getElementById('btn-continue');
      btnContinue.disabled = selectedGenres.length === 0;
    }

    // Load saved genres from profile
    function loadSavedGenres() {
      const prefs = localStorage.getItem('beatrec_preferences');
      if (prefs) {
        const data = JSON.parse(prefs);
        if (data.genres && Array.isArray(data.genres)) {
          selectedGenres = [...data.genres];
          // Update UI to show selected genres
          setTimeout(() => {
            const genreCards = document.querySelectorAll('.genre-chip');
            genreCards.forEach(card => {
              const genreName = card.querySelector('.genre-name').textContent;
              if (selectedGenres.includes(genreName)) {
                card.classList.add('active');
              }
            });
            updateCounter();
            updateButton();
          }, 100);
        }
      }
    }

    // Save genres to profile
    function saveGenres() {
      const prefs = {
        genres: selectedGenres
      };

      // Save to beatrec_preferences (primary storage for preferences)
      const existingPrefs = localStorage.getItem('beatrec_preferences');
      const mergedPrefs = existingPrefs ? { ...JSON.parse(existingPrefs), ...prefs } : prefs;
      localStorage.setItem('beatrec_preferences', JSON.stringify(mergedPrefs));

      // Also save using shared utility for profile array consistency
      saveProfileData(prefs);
    }

    function goBack() {
      navigateWithProfile('/rate-songs');
    }

    function goToNextPage() {
      saveGenres();
      showSnackbar('Genres saved!', 'success');
      setTimeout(() => {
        navigateWithProfile('/rate-songs');
      }, 500);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Initialize
    loadGenres();
    initProfileDisplay();
  </script>
</body>
</html>
