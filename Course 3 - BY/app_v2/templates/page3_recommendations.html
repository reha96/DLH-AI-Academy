<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BeatRec - Your Recommendations</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Syne:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- Shared Styles -->
  <link rel="stylesheet" href="/static/css/beatrec.css">

  <!-- Profile Utilities -->
  <script src="/static/profile-utils.js"></script>

  <style>
    /* Page-specific: Page 3 - Recommendations */
    .now-playing-section { margin-bottom: 28px; }
    .now-playing-card {
      background: linear-gradient(135deg, rgba(29,185,84,0.08) 0%, rgba(23,163,72,0.04) 100%);
      border: 1.5px solid rgba(29,185,84,0.2);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .song-title { font-size: 22px; }
    .song-artist { font-size: 16px; }
    .song-meta { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
    .match-chip { background: rgba(29,185,84,0.2); font-weight: 600; }
    .audio-player { border-radius: 14px; margin-bottom: 16px; }
    .queue-section { margin-bottom: 28px; }
    .queue-list { display: flex; flex-direction: column; gap: 12px; }
    .queue-item {
      display: flex; align-items: center; gap: 14px; padding: 14px;
      background: var(--mui-surface); border: 1px solid var(--mui-divider);
      border-radius: 14px; cursor: pointer; transition: all 0.2s;
    }
    .queue-item:hover { border-color: var(--mui-primary-light); background: rgba(29,185,84,0.04); transform: translateX(4px); }
    .queue-item.playing { border-color: var(--mui-primary-main); background: rgba(29,185,84,0.08); }
    .queue-art-wrapper { width: 64px; height: 64px; border-radius: 10px; overflow: hidden; flex-shrink: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); position: relative; }
    .queue-art { width: 100%; height: 100%; object-fit: cover; }
    .queue-art-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 28px; color: white; }
    .queue-info { flex: 1; min-width: 0; }
    .queue-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600; color: var(--mui-text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
    .queue-artist { font-size: 13px; color: var(--mui-text-secondary); margin-bottom: 6px; }
    .queue-meta { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
    .queue-tag { font-size: 10px; padding: 3px 8px; background: rgba(29,185,84,0.12); color: var(--mui-primary-main); border-radius: 12px; font-weight: 500; }
    .queue-match { font-size: 11px; font-weight: 600; color: var(--mui-primary-main); }
    .queue-play-btn { width: 40px; height: 40px; border-radius: 50%; background: rgba(29,185,84,0.12); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--mui-primary-main); transition: all 0.2s; flex-shrink: 0; }
    .queue-play-btn:hover { background: var(--mui-primary-main); color: white; transform: scale(1.1); }
    .queue-play-btn .icon { width: 20px; height: 20px; }
    
    /* Heart Icon Button */
    .queue-heart-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: transparent;
      border: 2px solid var(--mui-divider);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--mui-text-secondary);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      flex-shrink: 0;
    }
    .queue-heart-btn:hover {
      border-color: #ef5350;
      background: rgba(239, 83, 80, 0.08);
      transform: scale(1.1);
    }
    .queue-heart-btn.liked {
      background: linear-gradient(135deg, #ef5350 0%, #e53935 100%);
      border-color: #ef5350;
      color: white;
      animation: heartBeat 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .queue-heart-btn .icon { width: 20px; height: 20px; }
    
    /* Dislike Button */
    .queue-dislike-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: transparent;
      border: 2px solid var(--mui-divider);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--mui-text-secondary);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      flex-shrink: 0;
    }
    .queue-dislike-btn:hover {
      border-color: #ff5722;
      background: rgba(255, 87, 34, 0.08);
      transform: scale(1.1);
      color: #ff5722;
    }
    .queue-dislike-btn .icon { width: 20px; height: 20px; }
    
    @keyframes heartBeat {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    
    /* Song replacement animation */
    @keyframes slideOutRight {
      0% { opacity: 1; transform: translateX(0); }
      100% { opacity: 0; transform: translateX(100%); }
    }
    @keyframes slideInLeft {
      0% { opacity: 0; transform: translateX(-100%); }
      100% { opacity: 1; transform: translateX(0); }
    }
    .song-replacing {
      animation: slideOutRight 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }
    .song-new {
      animation: slideInLeft 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    /* Liked songs counter */
    .liked-songs-counter {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(239, 83, 80, 0.08);
      border: 1px solid rgba(239, 83, 80, 0.2);
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      color: #ef5350;
      margin-bottom: 16px;
    }
    .liked-songs-counter .icon { width: 18px; height: 18px; }
    .liked-songs-counter.limit-warning {
      background: rgba(255, 152, 0, 0.08);
      border-color: rgba(255, 152, 0, 0.3);
      color: #ff9800;
    }
    
    .mui-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--mui-divider);
      border-top-color: var(--mui-primary-main);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    /* Feedback Button - Prominent Style */
    .feedback-button {
      background: linear-gradient(135deg, #1DB954 0%, #1ed760 100%);
      color: white;
      font-weight: 600;
      padding: 12px 24px;
      box-shadow: 0 4px 14px rgba(29,185,84,0.4);
      border: none;
    }
    .feedback-button:hover {
      background: linear-gradient(135deg, #1ed760 0%, #24f06b 100%);
      box-shadow: 0 6px 18px rgba(29,185,84,0.5);
      transform: translateY(-2px);
    }
    .feedback-button .icon {
      color: white;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">
      <svg class="icon" id="theme-icon-sun" viewBox="0 0 24 24" style="display:none">
        <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1z"/>
      </svg>
      <svg class="icon" id="theme-icon-moon" viewBox="0 0 24 24">
        <path d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z"/>
      </svg>
    </button>

    <div class="mui-card">
      <div class="card-content">
        <div class="header">
          <div class="logo">Beat<span>Rec</span></div>
          <div class="subtitle" id="page-subtitle">Step 5 of 5 — Your Recommendations</div>
        </div>

        <div class="progress-stepper">
          <div class="step-dot completed"></div>
          <div class="step-dot completed"></div>
          <div class="step-dot completed"></div>
          <div class="step-dot completed"></div>
          <div class="step-dot active"></div>
        </div>

        <!-- Profile Summary -->
        <div class="progress-section" id="profile-summary">
          <!-- Loaded dynamically -->
        </div>

        <!-- Model Selector -->
        <div class="select-section">
          <div class="section-label">
            <svg class="icon" viewBox="0 0 24 24"><path d="M12 3V1L8 5l4 4V7c4.42 0 8 3.58 8 8 0 1.85-.63 3.55-1.69 4.9L19.88 21.4l1.41 1.41 1.42-1.41c1.35-1.75 2.29-3.95 2.29-6.4 0-5.52-4.48-10-10-10zm-4.06 6L6.53 7.59 5.12 9l1.41 1.41L7.94 9c0 4.42 3.58 8 8 8v-2c-3.31 0-6-2.69-6-6V9l-2-2z"/></svg>
            Recommendation Model
          </div>
          <select class="mui-select" id="model-select" onchange="loadRecommendations()">
            <optgroup label="Embedding Model" id="embedding-models-group">
              <!-- Embedding models loaded dynamically -->
            </optgroup>
          </select>
        </div>

        <!-- Loading State -->
        <div id="loading-container" class="loading">
          <div class="mui-spinner"></div>
          <div>Generating your personalized playlist...</div>
        </div>

        <!-- Recommendations Container (hidden until loaded) -->
        <div id="recommendations-container" style="display:none">
          <!-- Now Playing Section -->
          <div class="now-playing-section">
            <div class="section-label">
              <svg class="icon" viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
              Now Playing
            </div>
            <div class="now-playing-card" id="now-playing-card">
              <!-- Loaded dynamically -->
            </div>
          </div>

          <!-- Queue Section -->
          <div class="queue-section">
            <div class="section-label">
              <svg class="icon" viewBox="0 0 24 24"><path d="M15 6H3v2h12V6zM3 10v2h12v-2H3zm0 4v2h12v-2H3zm14 2v2h4v-6h-4v2h2v2h-2zM3 18h12v-2H3v2z"/></svg>
              Up Next
            </div>
            
            <!-- Liked Songs Counter -->
            <div class="liked-songs-counter" id="liked-songs-counter" style="display:none">
              <svg class="icon" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
              <span id="liked-count-text">0 songs liked</span>
            </div>
            
            <div class="queue-list" id="queue-list">
              <!-- Loaded dynamically -->
            </div>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="button-row">
          <button class="mui-button mui-button-outlined" onclick="goBack()">
            <svg class="icon" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            Back
          </button>
        </div>

        <div class="button-row" style="margin-top: 12px">
          <button class="mui-button feedback-button" onclick="goToFeedback()">
            <svg class="icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v4z"/></svg>
            Give Feedback
          </button>
          <button class="mui-button mui-button-outlined" onclick="startOver()">
            <svg class="icon" viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c5.52 0 10 4.48 10 10s-4.48 10-10 10S2 22.52 2 17H4c0 4.41 3.59 8 8 8s8-3.59 8-8-3.59-8-8-8z"/></svg>
            Start Over
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Snackbar -->
  <div class="mui-snackbar" id="snackbar">
    <svg class="icon" id="snackbar-icon" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
    <span class="snackbar-message" id="snackbar-message">Message</span>
  </div>

  <script>
    let recommendations = [];
    let currentSongIndex = 0;
    let isPlaying = false;
    let isDarkMode = false;
    let previewDuration = 30;
    let currentEmbeddingModel = 'MiniLM';  // Track current model for analytics

    // Theme Toggle
    function toggleTheme() {
      isDarkMode = !isDarkMode;
      document.documentElement.setAttribute('data-theme', isDarkMode ? 'dark' : 'light');
      document.getElementById('theme-icon-sun').style.display = isDarkMode ? 'block' : 'none';
      document.getElementById('theme-icon-moon').style.display = isDarkMode ? 'none' : 'block';
      localStorage.setItem('beatrec_theme', isDarkMode ? 'dark' : 'light');
    }

    // Load saved theme
    const savedTheme = localStorage.getItem('beatrec_theme');
    if (savedTheme === 'dark') {
      isDarkMode = true;
      document.documentElement.setAttribute('data-theme', 'dark');
      document.getElementById('theme-icon-sun').style.display = 'block';
      document.getElementById('theme-icon-moon').style.display = 'none';
    }

    // Algorithm A and B model definitions (using display names that match backend keys)
    const ALGORITHM_A_MODELS = ['MiniLM', 'MPNet', 'MultiQA', 'BAAI', 'GTE', 'Snowflake'];
    const ALGORITHM_B_MODELS = ['ColBERT', 'MxBAI', 'SPLADE'];

    // Load embedding models into dropdown (Algorithm A and B only)
    async function loadEmbeddingModels() {
      const group = document.getElementById('embedding-models-group');
      group.innerHTML = ''; // Clear existing options

      try {
        // Fetch available models from backend
        const response = await fetch('/api/embedding-models');
        const data = await response.json();
        const models = data.models || [];
        const defaultModel = data.default;

        // Add Algorithm A option (uses subset of models)
        const optionA = document.createElement('option');
        optionA.value = 'algorithm_a';
        optionA.textContent = 'Algorithm A (Random from quality models)';
        group.appendChild(optionA);

        // Add Algorithm B option (uses sparse/dense hybrid models)
        const optionB = document.createElement('option');
        optionB.value = 'algorithm_b';
        optionB.textContent = 'Algorithm B (Random from advanced models)';
        group.appendChild(optionB);

        // Add separator
        const separator = document.createElement('option');
        separator.disabled = true;
        separator.textContent = '─'.repeat(15);
        group.appendChild(separator);

        // Add individual model options
        models.forEach(modelName => {
          const option = document.createElement('option');
          option.value = modelName;
          option.textContent = modelName;
          if (modelName === defaultModel) {
            option.textContent += ' (Recommended)';
          }
          group.appendChild(option);
        });

        // Set default selection
        if (defaultModel) {
          group.value = defaultModel;
        }
      } catch (error) {
        console.error('Failed to load embedding models:', error);
        
        // Fallback: add Algorithm A/B options only
        const optionA = document.createElement('option');
        optionA.value = 'algorithm_a';
        optionA.textContent = 'Algorithm A';
        group.appendChild(optionA);

        const optionB = document.createElement('option');
        optionB.value = 'algorithm_b';
        optionB.textContent = 'Algorithm B';
        group.appendChild(optionB);
      }
    }

    // Get random model from algorithm group
    function getRandomModelFromAlgorithm(algorithm) {
      if (algorithm === 'algorithm_a') {
        const randomIndex = Math.floor(Math.random() * ALGORITHM_A_MODELS.length);
        return ALGORITHM_A_MODELS[randomIndex];
      } else if (algorithm === 'algorithm_b') {
        const randomIndex = Math.floor(Math.random() * ALGORITHM_B_MODELS.length);
        return ALGORITHM_B_MODELS[randomIndex];
      }
      return 'MiniLM'; // default fallback (display name, not file prefix)
    }

    // Snackbar
    function showSnackbar(message, type = 'info') {
      const snackbar = document.getElementById('snackbar');
      const snackbarMessage = document.getElementById('snackbar-message');
      const snackbarIcon = document.getElementById('snackbar-icon');
      
      snackbarMessage.textContent = message;
      snackbar.className = 'mui-snackbar';
      
      if (type === 'error') {
        snackbar.classList.add('error');
        snackbarIcon.innerHTML = '<path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/>';
      } else if (type === 'success') {
        snackbar.classList.add('success');
        snackbarIcon.innerHTML = '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>';
      } else {
        snackbarIcon.innerHTML = '<path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>';
      }
      
      snackbar.classList.add('show');
      setTimeout(() => snackbar.classList.remove('show'), 3000);
    }

    // Display Profile Summary
    function displayProfileSummary() {
      const profile = JSON.parse(localStorage.getItem('beatrec_profile') || '{}');
      const prefs = JSON.parse(localStorage.getItem('beatrec_preferences') || '{}');
      
      const name = profile.name || prefs.name || 'Listener';
      const genre = prefs.genres && prefs.genres.length > 0 ? prefs.genres[0] : 'Mixed';
      const mood = getMoodName(prefs.valence || 0.5, prefs.energy || 0.5);
      
      document.getElementById('profile-summary').innerHTML = `
        <div style="background:rgba(29,185,84,0.08);border:1px solid rgba(29,185,84,0.2);border-radius:14px;padding:16px;margin-bottom:20px">
          <div style="font-family:'Syne',sans-serif;font-size:16px;font-weight:600;color:var(--mui-text-primary);margin-bottom:8px">
            👋 ${escapeHtml(name)}'s Playlist
          </div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <span style="font-size:11px;padding:4px 10px;background:rgba(29,185,84,0.15);color:var(--mui-primary-main);border-radius:16px;font-weight:500">${escapeHtml(mood)}</span>
            <span style="font-size:11px;padding:4px 10px;background:rgba(29,185,84,0.15);color:var(--mui-primary-main);border-radius:16px;font-weight:500">${escapeHtml(genre)}</span>
            <span style="font-size:11px;padding:4px 10px;background:rgba(29,185,84,0.15);color:var(--mui-primary-main);border-radius:16px;font-weight:500">V:${Math.round((prefs.valence||0.5)*100)} E:${Math.round((prefs.energy||0.5)*100)}</span>
          </div>
        </div>
      `;
    }

    function getMoodName(valence, energy) {
      if (energy > 0.7) {
        if (valence < 0.4) return 'Energetic';
        if (valence > 0.6) return 'Euphoric';
        return 'Energetic';
      } else if (energy < 0.4) {
        if (valence < 0.4) return 'Calm';
        if (valence > 0.6) return 'Relaxed';
        return 'Calm';
      } else {
        if (valence < 0.4) return 'Neutral';
        if (valence > 0.6) return 'Content';
        return 'Neutral';
      }
    }

    async function loadRecommendations() {
      const container = document.getElementById('loading-container');
      const recContainer = document.getElementById('recommendations-container');
      const modelSelect = document.getElementById('model-select');
      const model = modelSelect.value;

      container.style.display = 'block';
      recContainer.style.display = 'none';

      const profile = JSON.parse(localStorage.getItem('beatrec_profile') || '{}');
      const prefs = JSON.parse(localStorage.getItem('beatrec_preferences') || '{}');

      // DEBUG: Log what we're loading from localStorage
      console.log('[BeatRec Debug] === LOADING RECOMMENDATIONS ===');
      console.log('[BeatRec Debug] Selected model from dropdown:', model);
      console.log('[BeatRec Debug] Profile from localStorage:', JSON.stringify(profile, null, 2));
      console.log('[BeatRec Debug] Preferences from localStorage:', JSON.stringify(prefs, null, 2));
      console.log('[BeatRec Debug] Profile ratings:', profile.ratings);
      console.log('[BeatRec Debug] Prefs valence:', prefs.valence, 'energy:', prefs.energy);

      // Determine if selected model is an embedding model or recommendation strategy
      const recommendationStrategies = ['hybrid', 'content', 'collaborative'];
      let embeddingModel = 'MiniLM';  // default (display name, not file prefix)
      let recommendationModel = 'hybrid';  // default
      let selectedAlgorithm = null;

      // Check if Algorithm A or B is selected
      if (model === 'algorithm_a' || model === 'algorithm_b') {
        selectedAlgorithm = model;
        embeddingModel = getRandomModelFromAlgorithm(model);
        console.log('[BeatRec Debug] Using', selectedAlgorithm, '- randomly selected embedding model:', embeddingModel);
      } else if (recommendationStrategies.includes(model)) {
        recommendationModel = model;
        console.log('[BeatRec Debug] Using recommendation strategy:', recommendationModel);
      } else {
        embeddingModel = model;
        console.log('[BeatRec Debug] Using embedding model directly:', embeddingModel);
      }

      // Store current model for like/dislike tracking
      currentEmbeddingModel = embeddingModel;

      const payload = {
        ratings: profile.ratings || [],
        valence: prefs.valence || 0.5,
        energy: prefs.energy || 0.5,
        mainstream: prefs.mainstream ? prefs.mainstream / 10 : 0.5,
        diversity: prefs.diversity !== undefined ? prefs.diversity : 0.5,
        genres: prefs.genres || [],
        decade: prefs.decade || 'Mixed',
        model: recommendationModel,
        embedding_model: embeddingModel
      };

      // DEBUG: Log the payload we're sending
      console.log('[BeatRec Debug] === SENDING TO API /api/recommend ===');
      console.log('[BeatRec Debug] Payload:', JSON.stringify(payload, null, 2));
      console.log('[BeatRec Debug] Valence being sent:', payload.valence);
      console.log('[BeatRec Debug] Energy being sent:', payload.energy);
      console.log('[BeatRec Debug] Mainstream being sent:', payload.mainstream);
      console.log('[BeatRec Debug] Diversity being sent:', payload.diversity);
      console.log('[BeatRec Debug] Genres being sent:', payload.genres);
      console.log('[BeatRec Debug] Decade being sent:', payload.decade);
      console.log('[BeatRec Debug] Model being sent:', payload.model);
      console.log('[BeatRec Debug] Embedding model being sent:', payload.embedding_model);
      console.log('[BeatRec Debug] ============================================');

      try {
        const response = await fetch('/api/recommend', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await response.json();
        recommendations = data.recommendations;
        currentSongIndex = 0;
        renderNowPlaying();
        renderQueue();
        updateLikedSongsCounter();  // Update counter on page load
        container.style.display = 'none';
        recContainer.style.display = 'block';

        // DEBUG: Log the response
        console.log('[BeatRec Debug] === API RESPONSE RECEIVED ===');
        console.log('[BeatRec Debug] Number of recommendations:', recommendations.length);
        console.log('[BeatRec Debug] First recommendation:', recommendations[0]);
        console.log('[BeatRec Debug] ============================');

        // Show success message with algorithm or model name
        let displayName;
        if (selectedAlgorithm === 'algorithm_a') {
          displayName = 'Algorithm A';
        } else if (selectedAlgorithm === 'algorithm_b') {
          displayName = 'Algorithm B';
        } else {
          displayName = model.includes('-') ? model.split('-')[0] : model;
        }
        showSnackbar(`${displayName} loaded`, 'success');
      } catch (error) {
        container.innerHTML = `
          <div style="color:var(--mui-error-main)">
            <svg class="icon icon-xl" style="margin-bottom:12px" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
            <div>Error loading recommendations</div>
          </div>
        `;
        console.error('[BeatRec Debug] Error:', error);
        showSnackbar('Failed to load recommendations', 'error');
      }
    }

    function renderNowPlaying() {
      if (recommendations.length === 0) return;

      const song = recommendations[currentSongIndex];
      const container = document.getElementById('now-playing-card');
      const isLiked = isSongLiked(song.track_id);

      container.innerHTML = `
        <div class="album-art-wrapper">
          ${song.artwork_url
            ? `<img class="album-art" src="${song.artwork_url}" alt="Album Art" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
               <div class="album-art-placeholder" style="display:none">🎵</div>`
            : `<div class="album-art-placeholder">🎵</div>`
          }
        </div>

        <div class="song-info">
          <div class="song-title">${escapeHtml(song.title)}</div>
          <div class="song-artist">${escapeHtml(song.artist)}</div>
          <div class="song-meta">
            <span class="song-chip">${escapeHtml(song.genre)}</span>
            <span class="song-chip match-chip">Match: ${song.match}</span>
          </div>
        </div>

        <div class="audio-player">
          ${song.preview_url ? `
            <div class="player-controls">
              <button class="mui-fab" id="play-btn" onclick="togglePlay()">
                <svg class="icon" id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
              </button>
              <div class="slider-container">
                <input type="range" class="mui-slider" id="progress-slider" min="0" max="${previewDuration * 1000}" value="0" oninput="seekAudio(this.value)">
                <div class="time-display">
                  <span id="time-current">0:00</span>
                  <span id="time-total">0:${previewDuration}</span>
                </div>
              </div>
            </div>
            <audio id="audio-element" preload="metadata" ontimeupdate="updateProgress()" onended="onAudioEnded()">
              <source src="${song.preview_url}" type="audio/mp4">
            </audio>
          ` : `
            <div style="text-align:center;padding:24px;color:var(--mui-text-secondary);font-size:14px">
              <svg class="icon icon-xl" style="opacity:0.5;margin-bottom:8px" viewBox="0 0 24 24"><path d="M12 3v9.28c-.47-.17-.97-.28-1.5-.28C8.01 12 6 14.01 6 16.5S8.01 21 10.5 21c2.31 0 4.2-1.75 4.45-4H15V6h4V3h-7z"/></svg><br>
              Preview not available
            </div>
          `}
        </div>

        <!-- Like/Dislike Buttons -->
        <div style="display:flex;justify-content:center;gap:16px;margin-top:16px">
          <button class="queue-dislike-btn" onclick="handleDislikeCurrentSong()" title="Dislike - remove and get new recommendation" style="width:48px;height:48px;border-width:2.5px">
            <svg class="icon" style="width:24px;height:24px" viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg>
          </button>
          <button class="queue-heart-btn ${isLiked ? 'liked' : ''}" onclick="handleLikeCurrentSong()" title="${isLiked ? 'Unlike' : 'Like'}" style="width:48px;height:48px;border-width:2.5px">
            <svg class="icon" style="width:24px;height:24px" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
          </button>
        </div>
        <div style="text-align:center;font-size:12px;color:var(--mui-text-secondary);margin-top:12px">
          <span style="color:#ff5722;margin-right:8px">⊖ Dislike</span>
          <span style="color:#ef5350">❤ Like to save</span>
        </div>
      `;
    }

    function renderQueue() {
      const container = document.getElementById('queue-list');
      const queueSongs = recommendations.filter((_, i) => i !== currentSongIndex);

      container.innerHTML = queueSongs.map((song, idx) => {
        const originalIdx = recommendations.indexOf(song);

        return `
          <div class="queue-item" onclick="playSong(${originalIdx})" id="queue-item-${song.track_id}">
            <div class="queue-art-wrapper">
              ${song.artwork_url
                ? `<img class="queue-art" src="${song.artwork_url}" alt="Album Art" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                   <div class="queue-art-placeholder" style="display:none">🎵</div>`
                : `<div class="queue-art-placeholder">🎵</div>`
              }
            </div>
            <div class="queue-info">
              <div class="queue-title">${escapeHtml(song.title)}</div>
              <div class="queue-artist">${escapeHtml(song.artist)}</div>
              <div class="queue-meta">
                <span class="queue-tag">${escapeHtml(song.genre)}</span>
                <span class="queue-match">${song.match}</span>
              </div>
            </div>
            <button class="queue-play-btn" onclick="event.stopPropagation(); playSong(${originalIdx})" title="Play">
              <svg class="icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </button>
          </div>
        `;
      }).join('');

      // Update liked songs counter
      updateLikedSongsCounter();
    }

    function playSong(index) {
      stopAudio();
      currentSongIndex = index;
      renderNowPlaying();
      renderQueue();
      showSnackbar(`Now playing: ${recommendations[index].title}`, 'success');
    }

    /**
     * Handle liking the currently playing song
     * - Save song to liked list
     * - Remove current song from recommendations
     * - Fetch new recommendation and add to end of list
     * - Update player to show next song
     * - Always maintain 5 songs visible
     */
    async function handleLikeCurrentSong() {
      if (recommendations.length === 0) return;

      // Store current song data BEFORE removing
      const currentSong = recommendations[currentSongIndex];
      const trackId = currentSong.track_id;

      // Check if already liked
      if (isSongLiked(trackId)) {
        showSnackbar('Song already liked', 'error');
        return;
      }

      // Check limit
      const likedCount = getLikedSongsCount();
      if (likedCount >= 50) {
        showSnackbar('Maximum 50 songs can be liked', 'error');
        return;
      }

      // Save to liked songs
      toggleLikeSong(trackId);
      
      // Track like for current model
      trackLikeForModel(currentEmbeddingModel);
      
      showSnackbar('Liked! Finding new recommendation...', 'success');

      // Remove current song from recommendations array
      recommendations.splice(currentSongIndex, 1);

      // Adjust currentSongIndex if needed - always point to same index or last item
      if (currentSongIndex >= recommendations.length) {
        currentSongIndex = Math.max(0, recommendations.length - 1);
      }

      // Fetch new recommendation (pass song data, not trackId)
      try {
        const newSong = await fetchReplacementSong(currentSong);
        if (newSong) {
          // Add to end of recommendations array
          recommendations.push(newSong);
          showSnackbar(`New song added to queue`, 'success');
        } else {
          console.warn('No new song found, trying again...');
          // Try one more time with fresh request
          const retrySong = await fetchReplacementSong(currentSong, true);
          if (retrySong) {
            recommendations.push(retrySong);
          }
        }
      } catch (error) {
        console.error('Failed to fetch replacement:', error);
      }

      // Re-render everything (instant update, no animation)
      renderNowPlaying();
      renderQueue();

      // Auto-play the current song
      if (recommendations.length > 0) {
        const audio = document.getElementById('audio-element');
        const playIcon = document.getElementById('play-icon');
        const song = recommendations[currentSongIndex];
        
        if (audio && song.preview_url) {
          // Reset audio source for new song
          audio.src = song.preview_url;
          audio.currentTime = 0;
          
          audio.play().then(() => {
            isPlaying = true;
            if (playIcon) {
              playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
            }
          }).catch(error => {
            console.log('Autoplay was prevented:', error);
          });
        }
      }
    }

    /**
     * Handle disliking the currently playing song
     * - Remove current song from recommendations
     * - Fetch new recommendation and add to end of list
     * - Update player to show next song
     * - Always maintain 5 songs visible
     * - Does NOT save to liked songs
     */
    async function handleDislikeCurrentSong() {
      if (recommendations.length === 0) return;

      // Store current song data BEFORE removing
      const currentSong = recommendations[currentSongIndex];

      // Track dislike for current model
      trackDislikeForModel(currentEmbeddingModel);
      
      showSnackbar('Finding new recommendation...', 'success');

      // Remove current song from recommendations array
      recommendations.splice(currentSongIndex, 1);

      // Adjust currentSongIndex if needed - always point to same index or last item
      if (currentSongIndex >= recommendations.length) {
        currentSongIndex = Math.max(0, recommendations.length - 1);
      }

      // Fetch new recommendation
      try {
        const newSong = await fetchReplacementSong(currentSong);
        if (newSong) {
          // Add to end of recommendations array
          recommendations.push(newSong);
          showSnackbar(`New song added to queue`, 'success');
        } else {
          console.warn('No new song found, trying again...');
          // Try one more time with fresh request
          const retrySong = await fetchReplacementSong(currentSong, true);
          if (retrySong) {
            recommendations.push(retrySong);
          }
        }
      } catch (error) {
        console.error('Failed to fetch replacement:', error);
      }

      // Re-render everything (instant update, no animation)
      renderNowPlaying();
      renderQueue();

      // Auto-play the current song
      if (recommendations.length > 0) {
        const audio = document.getElementById('audio-element');
        const playIcon = document.getElementById('play-icon');
        const song = recommendations[currentSongIndex];

        if (audio && song.preview_url) {
          // Reset audio source for new song
          audio.src = song.preview_url;
          audio.currentTime = 0;

          audio.play().then(() => {
            isPlaying = true;
            if (playIcon) {
              playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
            }
          }).catch(error => {
            console.log('Autoplay was prevented:', error);
          });
        }
      }
    }

    /**
     * Fetch a replacement song similar to the liked one
     * @param {Object} likedSong - The song that was liked (passed before removal)
     * @param {boolean} forceNew - If true, return first song even if duplicate
     */
    async function fetchReplacementSong(likedSong, forceNew = false) {
      // Get current preferences
      const profile = JSON.parse(localStorage.getItem('beatrec_profile') || '{}');
      const prefs = JSON.parse(localStorage.getItem('beatrec_preferences') || '{}');

      // Use same parameters as before
      const payload = {
        ratings: profile.ratings || [],
        valence: prefs.valence || 0.5,
        energy: prefs.energy || 0.5,
        mainstream: prefs.mainstream ? prefs.mainstream / 10 : 0.5,
        diversity: prefs.diversity !== undefined ? prefs.diversity : 0.5,
        genres: prefs.genres || [],
        decade: prefs.decade || 'Mixed',
        model: 'hybrid',
        embedding_model: 'MiniLM'
      };

      const response = await fetch('/api/recommend', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!response.ok) return null;

      const data = await response.json();
      if (data.recommendations && data.recommendations.length > 0) {
        // If forceNew, just return first song
        if (forceNew) {
          return data.recommendations[0];
        }
        
        // Return first recommendation that's not already in the list
        for (const rec of data.recommendations) {
          if (!recommendations.find(r => r.track_id === rec.track_id)) {
            return rec;
          }
        }
        // If all are duplicates, return first anyway
        return data.recommendations[0];
      }

      return null;
    }

    /**
     * Update liked songs counter display
     */
    function updateLikedSongsCounter() {
      const counter = document.getElementById('liked-songs-counter');
      const countText = document.getElementById('liked-count-text');

      if (!counter || !countText) return;

      const count = getLikedSongsCount();

      if (count > 0) {
        counter.style.display = 'flex';
        countText.textContent = `${count} song${count !== 1 ? 's' : ''} liked`;

        if (count >= 50) {
          counter.classList.add('limit-warning');
          countText.textContent = `${count}/50 songs liked (max reached)`;
        } else if (count >= 40) {
          counter.classList.add('limit-warning');
          countText.textContent = `${count}/50 songs liked`;
        } else {
          counter.classList.remove('limit-warning');
        }
      } else {
        counter.style.display = 'none';
      }
    }

    /**
     * Track likes per embedding model for analytics
     */
    function trackLikeForModel(model) {
      const likes = JSON.parse(localStorage.getItem('beatrec_model_likes') || '{}');
      likes[model] = (likes[model] || 0) + 1;
      localStorage.setItem('beatrec_model_likes', JSON.stringify(likes));
    }

    /**
     * Track dislikes per embedding model for analytics
     */
    function trackDislikeForModel(model) {
      const dislikes = JSON.parse(localStorage.getItem('beatrec_model_dislikes') || '{}');
      dislikes[model] = (dislikes[model] || 0) + 1;
      localStorage.setItem('beatrec_model_dislikes', JSON.stringify(dislikes));
    }

    /**
     * Get model analytics data (likes, dislikes, total recommendations per model)
     */
    function getModelAnalytics() {
      const likes = JSON.parse(localStorage.getItem('beatrec_model_likes') || '{}');
      const dislikes = JSON.parse(localStorage.getItem('beatrec_model_dislikes') || '{}');
      
      // Get all models that have been used
      const allModels = new Set([...Object.keys(likes), ...Object.keys(dislikes)]);
      
      const analytics = {};
      allModels.forEach(model => {
        analytics[model] = {
          likes: likes[model] || 0,
          dislikes: dislikes[model] || 0,
          total: (likes[model] || 0) + (dislikes[model] || 0)
        };
      });
      
      return analytics;
    }

    // Audio Player Functions
    function togglePlay() {
      const audio = document.getElementById('audio-element');
      const playIcon = document.getElementById('play-icon');
      
      if (!audio) return;
      
      if (isPlaying) {
        audio.pause();
        playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
        isPlaying = false;
      } else {
        audio.play();
        playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
        isPlaying = true;
      }
    }

    function stopAudio() {
      const audio = document.getElementById('audio-element');
      if (audio) {
        audio.pause();
        audio.currentTime = 0;
      }
      isPlaying = false;
    }

    function updateProgress() {
      const audio = document.getElementById('audio-element');
      const slider = document.getElementById('progress-slider');
      const timeCurrent = document.getElementById('time-current');
      
      if (audio && slider && timeCurrent) {
        const currentTime = Math.min(audio.currentTime, previewDuration);
        timeCurrent.textContent = formatTime(currentTime);
        slider.value = currentTime * 1000;
        
        if (audio.currentTime >= previewDuration) {
          audio.pause();
          audio.currentTime = 0;
          onAudioEnded();
        }
      }
    }

    function seekAudio(value) {
      const audio = document.getElementById('audio-element');
      if (audio) {
        const timeInSeconds = value / 1000;
        audio.currentTime = Math.min(timeInSeconds, previewDuration);
      }
    }

    function onAudioEnded() {
      isPlaying = false;
      const playIcon = document.getElementById('play-icon');
      if (playIcon) playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
    }

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function goToFeedback() {
      navigateWithProfile('/feedback');
    }

    // Navigation
    function goBack() {
      navigateWithProfile('/preferences');
    }

    function startOver() {
      if (confirm('Start over? This will clear all your ratings and preferences.')) {
        localStorage.removeItem('beatrec_profile');
        localStorage.removeItem('beatrec_preferences');
        window.location.href = '/';
      }
    }

    // Initialize
    displayProfileSummary();
    loadEmbeddingModels();
    loadRecommendations();
    displayProfileName('Step 5 of 5');
  </script>
</body>
</html>
